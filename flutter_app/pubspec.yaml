name: foodlens_ai
description: FoodLens AI - умный диетолог в кармане
publish_to: 'none'
version: 2.0.0+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_markdown: ^0.6.18
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.2.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.66.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Utils
  intl: ^0.20.2
  image: ^4.1.3
  path_provider: ^2.1.1
  open_filex: ^4.3.4
  package_info_plus: ^9.0.1
  
  # Voice & Audio (speech_to_text временно убран из-за проблем с Gradle)
  # speech_to_text: 6.3.0
  permission_handler: ^11.1.0
  lottie: ^3.0.0
  
  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  app_links: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/foodlens.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/foodlens.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/foodlens.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/foodlens.png"
